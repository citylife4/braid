name: Release Windows app

on:
  push:
    tags:
      - 'v*.*.*'

permissions:
  contents: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release-windows:
    runs-on: windows-latest
    timeout-minutes: 30

    steps:
      - name: Check out source
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Verify tag matches package version
        shell: pwsh
        run: |
          $version = node -p "require('./package.json').version"
          $expected = "v$version"
          if ($env:GITHUB_REF_NAME -ne $expected) {
            throw "Release tag $env:GITHUB_REF_NAME does not match package version $expected"
          }

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: |
          npm test
          node test/tunnel-test.js 3 2

      - name: Build and publish Windows release
        run: npm run build:win -- --publish always
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
